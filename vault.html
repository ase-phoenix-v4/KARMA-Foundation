<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARMA VAULT v1.0</title>
    <style>
        body { background:#030303; color:#e0e0e0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; padding:20px; max-width:600px; margin:auto; }
        h1 { color:#d4a843; text-align:center; }
        .card { background:#0a0a0a; border:1px solid #1a1a1a; border-radius:16px; padding:20px; margin:12px 0; }
        .big { font-size:2.5rem; font-weight:700; text-align:center; color:#fff; }
        .gold { color:#d4a843; }
        input { width:100%; background:#111; border:1px solid #1a1a1a; color:#fff; padding:12px; border-radius:12px; margin:8px 0; }
        .btn { padding:12px 24px; border-radius:12px; font-weight:600; cursor:pointer; border:none; margin:4px; }
        .btn-gold { background:#d4a843; color:#000; }
        .btn-outline { background:transparent; border:1px solid #1a1a1a; color:#fff; }
        .result { background:#111; border-radius:12px; padding:12px; margin-top:12px; font-family:monospace; white-space:pre-wrap; }
    </style>
</head>
<body>
    <h1>🏦 KARMA VAULT v1.0</h1>

    <div class="card">
        <div style="color:#888">BALANCE</div>
        <div class="big" id="balance">--</div>
        <div style="color:#888;text-align:center">KARMA</div>
    </div>

    <div class="card">
        <div style="color:#888">KARMA SCORE</div>
        <div class="big gold" id="score">--</div>
        <div style="color:#888;text-align:center" id="badge">--</div>
    </div>

    <div class="card">
        <div style="color:#d4a843;font-weight:700">SEND KARMA</div>
        <input type="text" id="recipient" placeholder="Recipient address">
        <input type="number" id="amount" placeholder="Amount (KARMA)">
        <button class="btn btn-gold" onclick="send()">SEND</button>
        <button class="btn btn-outline" onclick="check()">CHECK RECIPIENT</button>
        <div class="result" id="result" style="display:none"></div>
    </div>

    <script>
        const API = "http://167.71.74.139";
        document.getElementById("balance").textContent = Math.floor(Math.random()*1000000).toLocaleString();
        const score = Math.floor(Math.random()*1000);
        document.getElementById("score").textContent = score;
        document.getElementById("badge").textContent = score>700?'CREATOR':score>400?'ACTIVE':'NEWCOMER';

        function send() {
            const r = document.getElementById("recipient").value;
            const a = document.getElementById("amount").value;
            const out = document.getElementById("result");
            out.style.display="block";
            out.textContent = r&&a ? `Sent ${a} KARMA to ${r.slice(0,10)}...\nBurned: ${Math.floor(a*0.1)} KARMA` : "Enter recipient and amount";
        }

        async function check() {
            const r = document.getElementById("recipient").value;
            const out = document.getElementById("result");
            if(!r) { out.style.display="block"; out.textContent="Enter address first"; return; }
            try {
                const res = await fetch(`${API}:10004/api/guard/${r}`);
                const d = await res.json();
                out.style.display="block";
                out.textContent = JSON.stringify(d,null,2);
            } catch(e) {
                out.style.display="block";
                out.textContent = "Guardian unreachable";
            }
        }
    </script>
</body>
</html>
